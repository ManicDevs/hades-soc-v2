version: '3.8'

services:
  hades:
    build: .
    container_name: hades
    restart: unless-stopped
    ports:
      - "8443:8443"
      - "8080:8080"
    environment:
      - HADES_DB_TYPE=postgres
      - HADES_DB_HOST=postgres
      - HADES_DB_PORT=5432
      - HADES_DB_NAME=hades
      - HADES_DB_USER=hades
      - HADES_DB_PASSWORD=secure-password
      - HADES_REDIS_URL=redis://redis:6379
      - HADES_LOG_LEVEL=info
    volumes:
      - hades_data:/app/data
      - hades_logs:/app/logs
      - hades_config:/app/config
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8443/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - hades-network

  postgres:
    image: postgres:15-alpine
    container_name: hades-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: hades
      POSTGRES_USER: hades
      POSTGRES_PASSWORD: secure-password
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hades"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hades-network

  redis:
    image: redis:7-alpine
    container_name: hades-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass redis-password
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - hades-network

  nginx:
    image: nginx:alpine
    container_name: hades-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - hades
    networks:
      - hades-network

volumes:
  hades_data:
    driver: local
  hades_logs:
    driver: local
  hades_config:
    driver: local
  postgres_data:
    driver: local
  redis_data:
    driver: local
  nginx_logs:
    driver: local

networks:
  hades-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
