# HADES-V2 Traefik Dynamic Configuration for Development Environment
# Middleware and routing rules for enhanced security and performance

http:
  middlewares:
    # Security Headers Middleware
    security-headers:
      headers:
        customRequestHeaders:
          X-Forwarded-Proto: "http"
          X-Forwarded-Host: "hades.localhost"
        customResponseHeaders:
          X-Frame-Options: "DENY"
          X-Content-Type-Options: "nosniff"
          X-XSS-Protection: "1; mode=block"
          Referrer-Policy: "strict-origin-when-cross-origin"
          Content-Security-Policy: "default-src * 'unsafe-inline' 'unsafe-eval' data: blob:; connect-src *; script-src 'self' 'unsafe-inline' 'unsafe-eval' 'unsafe-eval'; style-src 'self' 'unsafe-inline';"
        accessControlAllowCredentials: true
        accessControlAllowOriginList:
          - "http://api.hades.localhost:8084"
          - "http://dashboard.hades.localhost:8084"
          - "http://admin.hades.localhost:8084"
          - "http://monitoring.hades.localhost:8084"
          - "http://localhost:3000"
          - "http://localhost:8080"
          - "http://localhost:8084"
        accessControlAllowMethods:
          - "GET"
          - "POST"
          - "PUT"
          - "DELETE"
          - "OPTIONS"
        accessControlAllowHeaders:
          - "*"
        accessControlExposeHeaders:
          - "*"

    # Rate Limiting Middleware
    rate-limit:
      rateLimit:
        average: 100
        period: 1m
        burst: 200

    # API Rate Limiting (Stricter)
    api-rate-limit:
      rateLimit:
        average: 50
        period: 1m
        burst: 100

    # Auth Rate Limiting (Very Strict)
    auth-rate-limit:
      rateLimit:
        average: 10
        period: 1m
        burst: 20

    # Compression Middleware
    compress:
      compress:
        excludedContentTypes:
          - text/event-stream
          - application/grpc

    # Circuit Breaker Middleware
    circuit-breaker:
      circuitBreaker:
        expression: "NetworkErrorRatio() > 0.5"
        checkPeriod: 5s
        fallbackDuration: 10s
        recoveryDuration: 10s

    # Retry Middleware
    retry:
      retry:
        attempts: 3
        initialInterval: 100ms

    # Buffering Middleware
    buffering:
      buffering:
        maxRequestBodyBytes: 10485760  # 10MB
        memRequestBodyBytes: 1048576     # 1MB
        maxResponseBodyBytes: 10485760 # 10MB
        memResponseBodyBytes: 1048576   # 1MB
        retryExpression: "IsNetworkError() && Attempts() < 2"

  routers:
    # API Router
    hades-api-dev-router:
      rule: "Host(`api.hades.localhost`)"
      entryPoints:
        - web
      middlewares:
        - security-headers@file
        - rate-limit@file
      service: hades-api-dev-service

    # Dashboard Router
    hades-dashboard-dev-router:
      rule: "Host(`dashboard.hades.localhost`)"
      entryPoints:
        - web
      middlewares:
        - security-headers@file
        - rate-limit@file
      service: hades-dashboard-dev-service

    # Admin Router
    hades-admin-dev-router:
      rule: "Host(`admin.hades.localhost`)"
      entryPoints:
        - web
      middlewares:
        - security-headers@file
        - rate-limit@file
      service: hades-admin-dev-service

    # Monitoring Router
    hades-monitoring-dev-router:
      rule: "Host(`monitoring.hades.localhost`)"
      entryPoints:
        - web
      middlewares:
        - security-headers@file
        - rate-limit@file
      service: hades-monitoring-dev-service

  services:
    # API Service with Load Balancing
    hades-api-dev-service:
      loadBalancer:
        servers:
          - url: "http://hades-api-dev:8080"
        passHostHeader: true
        serversTransport: "secure-transport"

    # Dashboard Service
    hades-dashboard-dev-service:
      loadBalancer:
        servers:
          - url: "http://hades-dashboard-dev:3000"
        passHostHeader: true

    # Admin Service
    hades-admin-dev-service:
      loadBalancer:
        servers:
          - url: "http://hades-admin-dev:8080"
        passHostHeader: true

    # Monitoring Service
    hades-monitoring-dev-service:
      loadBalancer:
        servers:
          - url: "http://hades-monitoring-dev:8080"
        passHostHeader: true

  serversTransports:
    secure-transport:
      insecureSkipVerify: true
      maxIdleConnsPerHost: 100

tls:
  stores:
    default:
      defaultCertificate:
        certFile: "/etc/ssl/certs/hades-dev.crt"
        keyFile: "/etc/ssl/private/hades-dev.key"
  options:
    default:
      minVersion: "VersionTLS12"
      cipherSuites:
        - "TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384"
        - "TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256"
        - "TLS_ECDHE_RSA_WITH_CHACHA20_POLY1305_SHA256"
      sniStrict: true
      curvePreferences:
        - "CurveP521"
        - "CurveP384"
        - "CurveP256"
