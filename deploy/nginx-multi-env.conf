# HADES-V2 Multi-Environment Nginx Configuration
# Supports dev, test, and prod environments with distinct hosts and ports

# Rate Limiting
limit_req_zone $binary_remote_addr zone=api_dev:10m rate=20r/s;
limit_req_zone $binary_remote_addr zone=api_test:10m rate=15r/s;
limit_req_zone $binary_remote_addr zone=api_prod:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=auth_dev:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=auth_test:10m rate=8r/s;
limit_req_zone $binary_remote_addr zone=auth_prod:10m rate=5r/s;

# Upstream Servers - Development
upstream hades_api_dev {
    server 127.0.0.1:8080;
    keepalive 32;
}

upstream hades_dashboard_dev {
    server 127.0.0.1:3000;
    keepalive 32;
}

upstream hades_admin_dev {
    server 127.0.0.1:8081;
    keepalive 32;
}

upstream hades_monitoring_dev {
    server 127.0.0.1:3001;
    keepalive 32;
}

# Upstream Servers - Test
upstream hades_api_test {
    server 127.0.0.1:8180;
    keepalive 32;
}

upstream hades_dashboard_test {
    server 127.0.0.1:3100;
    keepalive 32;
}

upstream hades_admin_test {
    server 127.0.0.1:8181;
    keepalive 32;
}

upstream hades_monitoring_test {
    server 127.0.0.1:3101;
    keepalive 32;
}

# Upstream Servers - Production
upstream hades_api_prod {
    server 127.0.0.1:8443;
    keepalive 32;
}

upstream hades_dashboard_prod {
    server 127.0.0.1:8444;
    keepalive 32;
}

upstream hades_admin_prod {
    server 127.0.0.1:8445;
    keepalive 32;
}

upstream hades_monitoring_prod {
    server 127.0.0.1:8446;
    keepalive 32;
}

# HTTP to HTTPS Redirect
server {
    listen 80;
    listen [::]:80;
    server_name _;
    return 301 https://$server_name$request_uri;
}

# Development Environment Server Block
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name hades-dev.localhost hades-admin-dev.localhost hades-monitoring-dev.localhost;

    # SSL Certificates
    ssl_certificate /etc/ssl/certs/hades-enterprise.crt;
    ssl_certificate_key /etc/ssl/private/hades-enterprise.key;

    # Development API Routes
    location /api/ {
        limit_req zone=api_dev burst=30 nodelay;
        proxy_pass http://hades_api_dev;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # Development Authentication Routes
    location /api/v1/auth/ {
        limit_req zone=auth_dev burst=15 nodelay;
        proxy_pass http://hades_api_dev;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Development Dashboard Routes
    location / {
        proxy_pass http://hades_dashboard_dev;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Development Admin Panel
    location /admin/ {
        proxy_pass http://hades_admin_dev;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Development Monitoring
    location /monitoring/ {
        proxy_pass http://hades_monitoring_dev;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket Support
    location /ws/ {
        proxy_pass http://hades_api_dev;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health Check
    location /health {
        access_log off;
        return 200 "dev-healthy\n";
        add_header Content-Type text/plain;
    }
}

