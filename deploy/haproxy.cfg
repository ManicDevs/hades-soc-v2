# HADES-V2 Enterprise HAProxy Configuration
# High-availability load balancer with health checks

global
    daemon
    maxconn 4096
    user haproxy
    group haproxy
    log /dev/log local0
    log /dev/log local1 notice
    stats socket /run/haproxy/admin.sock mode 660 level admin expose-fd listeners
    stats timeout 30s
    ssl-default-bind-ciphers ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES256-GCM-SHA384
    ssl-default-bind-ciphersuites TLS_AES_128_GCM_SHA256:TLS_AES_256_GCM_SHA384:TLS_CHACHA20_POLY1305_SHA256
    ssl-default-bind-options ssl-min-ver TLSv1.2 no-tls-tickets

defaults
    log global
    mode http
    option httplog
    option dontlognull
    option http-server-close
    option forwardfor except 127.0.0.0/8
    option redispatch
    retries 3
    timeout http-request 10s
    timeout queue 1m
    timeout connect 10s
    timeout client 1m
    timeout server 1m
    timeout http-keep-alive 10s
    timeout check 10s
    maxconn 3000

# Statistics Page
listen stats
    bind *:9000
    mode http
    stats enable
    stats uri /stats
    stats refresh 30s
    stats admin if TRUE
    stats realm HAProxy\ Statistics
    stats auth admin:securepassword123
    stats show-node
    stats show-desc HADES-V2 Enterprise Load Balancer

# Frontend for HTTPS Traffic - Hades Production
frontend https_frontend
    bind *:8443 ssl crt /etc/ssl/certs/hades-enterprise.pem
    mode http
    option httplog
    option forwardfor
    option http-server-close
    stats enable
    stats uri /haproxy?stats
    http-request deny unless { ssl_fc }
    http-request set-header X-Forwarded-Proto https
    
    # ACLs for routing
    acl is_api path_beg /api/
    acl is_auth path_beg /api/v1/auth/
    acl is_admin path_beg /admin/
    acl is_monitoring path_beg /monitoring/
    acl is_websocket path_beg /ws/
    acl is_health path /health
    
    # Routing
    use_backend api_backend if is_api
    use_backend auth_backend if is_auth
    use_backend admin_backend if is_admin
    use_backend monitoring_backend if is_monitoring
    use_backend websocket_backend if is_websocket
    use_backend health_backend if is_health
    default_backend web_backend

# Frontend for Admin Traffic
frontend admin_frontend
    bind *:8445 ssl crt /etc/ssl/certs/hades-enterprise.pem
    mode http
    option httplog
    option forwardfor
    option http-server-close
    http-request deny unless { ssl_fc }
    http-request set-header X-Forwarded-Proto https
    
    # Admin Panel Routes
    default_backend admin_backend

# Frontend for Monitoring Traffic
frontend monitoring_frontend
    bind *:8446 ssl crt /etc/ssl/certs/hades-enterprise.pem
    mode http
    option httplog
    option forwardfor
    option http-server-close
    http-request deny unless { ssl_fc }
    http-request set-header X-Forwarded-Proto https
    
    # Monitoring Routes
    default_backend monitoring_backend

# Frontend for HTTP (Redirect to HTTPS)
frontend http_frontend
    bind *:8080
    mode http
    redirect scheme https code 301

# API Backend
backend api_backend
    mode http
    balance roundrobin
    option httpchk GET /health
    server api1 127.0.0.1:8443 check inter 5s rise 2 fall 3
    server api2 127.0.0.1:8444 check inter 5s rise 2 fall 3 backup
    http-request set-header X-Backend-Server api

# Auth Backend (Stricter health checks)
backend auth_backend
    mode http
    balance roundrobin
    option httpchk POST /api/v1/auth/health
    http-request set-header Content-Type application/json
    server auth1 127.0.0.1:8443 check inter 3s rise 3 fall 2
    http-request set-header X-Backend-Server auth

# Admin Backend
backend admin_backend
    mode http
    balance roundrobin
    option httpchk GET /admin/health
    server admin1 127.0.0.1:8445 check inter 5s rise 2 fall 3
    http-request set-header X-Backend-Server admin

# Monitoring Backend
backend monitoring_backend
    mode http
    balance roundrobin
    option httpchk GET /monitoring/health
    server monitoring1 127.0.0.1:8446 check inter 5s rise 2 fall 3
    http-request set-header X-Backend-Server monitoring

# WebSocket Backend
backend websocket_backend
    mode http
    balance source
    option httpchk GET /ws/health
    server ws1 127.0.0.1:8443 check inter 5s rise 2 fall 3
    http-request set-header X-Backend-Server websocket

# Web Backend
backend web_backend
    mode http
    balance roundrobin
    option httpchk GET /
    server web1 127.0.0.1:8444 check inter 5s rise 2 fall 3
    http-request set-header X-Backend-Server web

# Health Check Backend
backend health_backend
    mode http
    balance roundrobin
    server health1 127.0.0.1:8443 check inter 2s rise 3 fall 1
    http-request set-header X-Backend-Server health

# Rate Limiting Tables
backend rate_limit
    stick-table type ip size 1m expire 1m store http_req_rate(10s)

# API Rate Limiting
backend table_rate_limit_api
    stick-table type ip size 1m expire 1m store http_req_rate(10s)

# Auth Rate Limiting
backend table_rate_limit_auth
    stick-table type ip size 1m expire 1m store http_req_rate(10s)

# TCP Frontend for Internal Services
frontend internal_tcp_frontend
    bind *:2112
    mode tcp
    default_backend internal_tcp_backend

# Internal TCP Backend
backend internal_tcp_backend
    mode tcp
    balance roundrobin
    server sentinel1 127.0.0.1:2112 check inter 5s rise 2 fall 3
