# Hades SOC V2.0 - Simple Containerized Deployment
# Load variables from .env file automatically

services:
  # Hades Sentinel - Main service
  hades-sentinel:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VERSION: ${VERSION}
        BUILD_TIME:
    container_name: hades-sentinel-${ENV_SUFFIX}.localhost
    restart: ${RESTART_POLICY:-unless-stopped}
    networks:
      - hades-backend
    ports:
      - "${SENTINEL_PORT}:2112"  # Metrics and health
    environment:
      - HADES_ENV=${HADES_ENV}
      - DATABASE_URL=${DATABASE_URL}
      - GIN_MODE=${GIN_MODE}
      - LOG_LEVEL=${LOG_LEVEL}
    volumes:
      - ./data/sentinel:/app/data
      - ./logs:/app/logs
      - ./config:/app/config:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:2112/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    cap_add:
      - NET_BIND_SERVICE

  # Hades API - REST API endpoints
  hades-api:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VERSION: ${VERSION}
        BUILD_TIME:
    container_name: hades-api-${ENV_SUFFIX}.localhost
    restart: ${RESTART_POLICY:-unless-stopped}
    networks:
      - hades-backend
    ports:
      - "${HADES_API_PORT}:8080"  # API endpoints
    environment:
      - HADES_ENV=${HADES_ENV}
      - DATABASE_URL=${DATABASE_URL}
      - GIN_MODE=${GIN_MODE}
      - LOG_LEVEL=${LOG_LEVEL}
    volumes:
      - ./data/sentinel:/app/data
      - ./logs:/app/logs
      - ./config:/app/config:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    cap_add:
      - NET_BIND_SERVICE

  # Hades Dashboard - React web UI
  hades-dashboard:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: hades-dashboard-${ENV_SUFFIX}.localhost
    restart: ${RESTART_POLICY:-unless-stopped}
    networks:
      - hades-backend
    ports:
      - "${DASHBOARD_PORT}:80"  # Web dashboard
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    security_opt:
      - no-new-privileges:${NON_ROOT_USER:-true}

  # Uptime Kuma - Monitoring dashboard
  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: hades-uptime-kuma-${ENV_SUFFIX}.localhost
    restart: ${RESTART_POLICY:-unless-stopped}
    networks:
      - hades-backend
    environment:
      - NODE_ENV=${HADES_ENV}
    volumes:
      - ./data/uptime-kuma:/app/data
    ports:
      - "${UPTIME_KUMA_PORT}:3001"  # Uptime Kuma UI
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3001 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    security_opt:
      - no-new-privileges:${NON_ROOT_USER:-true}

networks:
  hades-backend-${ENV_SUFFIX}:
    driver: bridge
    ipam:
      config:
        - subnet: ${INTERNAL_NETWORK_SUBNET}
          gateway: ${INTERNAL_NETWORK_GATEWAY}
