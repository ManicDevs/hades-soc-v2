# HADES-V2 Multi-Environment HAProxy Configuration
# Supports dev, test, and prod environments with distinct hosts and ports

global
    daemon
    maxconn 4096
    user haproxy
    group haproxy
    log /dev/log local0
    log /dev/log local1 notice
    stats socket /run/haproxy/admin.sock mode 660 level admin expose-fd listeners
    stats timeout 30s
    ssl-default-bind-ciphers ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES256-GCM-SHA384
    ssl-default-bind-ciphersuites TLS_AES_128_GCM_SHA256:TLS_AES_256_GCM_SHA384:TLS_CHACHA20_POLY1305_SHA256
    ssl-default-bind-options ssl-min-ver TLSv1.2 no-tls-tickets

defaults
    log global
    mode http
    option httplog
    option dontlognull
    option http-server-close
    option forwardfor except 127.0.0.0/8
    option redispatch
    retries 3
    timeout http-request 10s
    timeout queue 1m
    timeout connect 10s
    timeout client 1m
    timeout server 1m
    timeout http-keep-alive 10s
    timeout check 10s
    maxconn 3000

# Statistics Page
listen stats
    bind *:9000
    mode http
    stats enable
    stats uri /stats
    stats refresh 30s
    stats admin if TRUE
    stats realm HAProxy\ Statistics
    stats auth admin:securepassword123
    stats show-node
    stats show-desc HADES-V2 Multi-Environment Load Balancer

# Development Frontend
frontend dev_frontend
    bind *:8080 ssl crt /etc/ssl/certs/hades-enterprise.pem
    mode http
    option httplog
    option forwardfor
    option http-server-close
    stats enable
    stats uri /dev-stats
    http-request deny unless { ssl_fc }
    http-request set-header X-Forwarded-Proto https
    http-request set-header X-Environment dev
    
    # ACLs for routing
    acl is_api path_beg /api/
    acl is_auth path_beg /api/v1/auth/
    acl is_admin path_beg /admin/
    acl is_monitoring path_beg /monitoring/
    acl is_websocket path_beg /ws/
    acl is_health path /health
    
    # Routing
    use_backend dev_api_backend if is_api
    use_backend dev_auth_backend if is_auth
    use_backend dev_admin_backend if is_admin
    use_backend dev_monitoring_backend if is_monitoring
    use_backend dev_websocket_backend if is_websocket
    use_backend dev_health_backend if is_health
    default_backend dev_web_backend

# Test Frontend
frontend test_frontend
    bind *:8180 ssl crt /etc/ssl/certs/hades-enterprise.pem
    mode http
    option httplog
    option forwardfor
    option http-server-close
    stats enable
    stats uri /test-stats
    http-request deny unless { ssl_fc }
    http-request set-header X-Forwarded-Proto https
    http-request set-header X-Environment test
    
    # ACLs for routing
    acl is_api path_beg /api/
    acl is_auth path_beg /api/v1/auth/
    acl is_admin path_beg /admin/
    acl is_monitoring path_beg /monitoring/
    acl is_websocket path_beg /ws/
    acl is_health path /health
    
    # Routing
    use_backend test_api_backend if is_api
    use_backend test_auth_backend if is_auth
    use_backend test_admin_backend if is_admin
    use_backend test_monitoring_backend if is_monitoring
    use_backend test_websocket_backend if is_websocket
    use_backend test_health_backend if is_health
    default_backend test_web_backend

# Production Frontend
frontend prod_frontend
    bind *:8443 ssl crt /etc/ssl/certs/hades-enterprise.pem
    mode http
    option httplog
    option forwardfor
    option http-server-close
    stats enable
    stats uri /prod-stats
    http-request deny unless { ssl_fc }
    http-request set-header X-Forwarded-Proto https
    http-request set-header X-Environment prod
    
    # ACLs for routing
    acl is_api path_beg /api/
    acl is_auth path_beg /api/v1/auth/
    acl is_admin path_beg /admin/
    acl is_monitoring path_beg /monitoring/
    acl is_websocket path_beg /ws/
    acl is_health path /health
    
    # Routing
    use_backend prod_api_backend if is_api
    use_backend prod_auth_backend if is_auth
    use_backend prod_admin_backend if is_admin
    use_backend prod_monitoring_backend if is_monitoring
    use_backend prod_websocket_backend if is_websocket
    use_backend prod_health_backend if is_health
    default_backend prod_web_backend

# Development Backends
backend dev_api_backend
    mode http
    balance roundrobin
    option httpchk GET /health
    server api1 127.0.0.1:8080 check inter 5s rise 2 fall 3
    http-request set-header X-Backend-Server dev-api

backend dev_auth_backend
    mode http
    balance roundrobin
    option httpchk POST /api/v1/auth/health
    http-request set-header Content-Type application/json
    server auth1 127.0.0.1:8080 check inter 3s rise 3 fall 2
    http-request set-header X-Backend-Server dev-auth

backend dev_admin_backend
    mode http
    balance roundrobin
    option httpchk GET /admin/health
    server admin1 127.0.0.1:8081 check inter 5s rise 2 fall 3
    http-request set-header X-Backend-Server dev-admin

backend dev_monitoring_backend
    mode http
    balance roundrobin
    option httpchk GET /monitoring/health
    server monitoring1 127.0.0.1:3001 check inter 5s rise 2 fall 3
    http-request set-header X-Backend-Server dev-monitoring

backend dev_websocket_backend
    mode http
    balance source
    option httpchk GET /ws/health
    server ws1 127.0.0.1:8080 check inter 5s rise 2 fall 3
    http-request set-header X-Backend-Server dev-websocket

backend dev_web_backend
    mode http
    balance roundrobin
    option httpchk GET /
    server web1 127.0.0.1:3000 check inter 5s rise 2 fall 3
    http-request set-header X-Backend-Server dev-web

backend dev_health_backend
    mode http
    balance roundrobin
    server health1 127.0.0.1:8080 check inter 2s rise 3 fall 1
    http-request set-header X-Backend-Server dev-health

