# HADES-V2 Traefik Configuration for Development Environment
# Advanced reverse proxy with automatic service discovery and SSL termination

api:
  dashboard: true
  insecure: true
  debug: true

entryPoints:
  web:
    address: ":80"
    http:
      middlewares:
        - security-headers@file
        - rate-limit@file
  websecure:
    address: ":443"
    http:
      tls:
        certResolver: letsencrypt
        domains:
          - main: "*.localhost"
            sans: ["*.dev.localhost"]
      middlewares:
        - security-headers@file
        - rate-limit@file

providers:
  file:
    filename: /etc/traefik/dynamic.yml

certificatesResolvers:
  letsencrypt:
    acme:
      email: "dev@hades.localhost"
      storage: /etc/traefik/acme.json
      httpChallenge:
        entryPoint: web

log:
  level: DEBUG
  filePath: "/var/log/traefik/traefik.log"
  format: json

accessLog:
  filePath: "/var/log/traefik/access.log"
  format: json
  bufferingSize: 100
  fields:
    names:
      ClientUsername: client_username
      ClientHost: client_host
    defaultMode: keep

ping: true
metrics:
  prometheus:
    manualRouting: true

global:
  checkNewVersion: false
  sendAnonymousUsage: false
