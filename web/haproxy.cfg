global
    log stdout format raw local0
    maxconn 4096

defaults
    log global
    mode http
    timeout connect 5000ms
    timeout client 50000ms
    timeout server 50000ms
    timeout http-request 10s
    timeout http-keep-alive 10s

frontend hades_frontend
    bind *:3000
    option forwardfor
    option http-server-close
    
    # WebSocket upgrade handling for hot reload
    acl is_websocket hdr(upgrade) -i websocket
    acl is_hot_reload path_beg -i /ws
    
    # Route WebSocket requests to hot reload server
    use_backend hot_reload_backend if is_websocket is_hot_reload
    
    # Route regular HTTP requests to frontend
    default_backend frontend_backend

backend frontend_backend
    server frontend1 frontend:3001 check
    option httpchk GET / HTTP/1.1\r\nHost:\ localhost

backend hot_reload_backend
    server hotreload1 hot-reload:3002 check
    option httpchk GET / HTTP/1.1\r\nHost:\ localhost
