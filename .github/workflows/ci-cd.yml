# HADES-V2 CI/CD Pipeline
# Comprehensive automated testing, security scanning, and deployment

name: HADES-V2 CI/CD Pipeline

on:
  push:
    branches: [ main, develop, 'feature/*', 'hotfix/*' ]
  pull_request:
    branches: [ main, develop ]
  release:
    types: [ published ]

env:
  GO_VERSION: '1.21'
  NODE_VERSION: '18'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Code Quality and Security
  code-quality:
    name: Code Quality & Security
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Cache Go modules
        uses: actions/cache@v3
        with:
          path: ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Run Go formatter check
        run: |
          if [ "$(gofmt -s -l . | wc -l)" -gt 0 ]; then
            echo "Go code is not formatted properly"
            gofmt -s -l .
            exit 1
          fi

      - name: Run Go vet
        run: go vet ./...

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v3
        with:
          version: latest
          args: --timeout=5m

      - name: Run Go mod tidy check
        run: |
          cp go.mod go.mod.orig
          go mod tidy
          if ! diff -u go.mod.orig go.mod; then
            echo "go.mod is not tidy"
            exit 1
          fi

      - name: Run Node.js linting
        run: |
          cd web
          npm ci
          npm run lint

      - name: Security scan (Go)
        uses: securecodewarrior/github-action-gosec@master
        with:
          args: './...'

      - name: Security scan (Node.js)
        run: |
          cd web
          npm audit --audit-level moderate

      - name: Check for secrets
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: main
          head: HEAD

  # Go Testing
  go-tests:
    name: Go Tests
    runs-on: ubuntu-latest
    needs: code-quality
    strategy:
      matrix:
        go-version: ['1.20', '1.21']
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go ${{ matrix.go-version }}
        uses: actions/setup-go@v4
        with:
          go-version: ${{ matrix.go-version }}

      - name: Cache Go modules
        uses: actions/cache@v3
        with:
          path: ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ matrix.go-version }}-${{ hashFiles('**/go.sum') }}

      - name: Run unit tests
        run: go test -v -race -coverprofile=coverage.out ./...

      - name: Run integration tests
        run: go test -v -race -tags=integration ./tests/integration/...

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.out
          flags: unittests
          name: codecov-umbrella

      - name: Generate test report
        uses: dorny/test-reporter@v1
        if: success() || failure()
        with:
          name: Go Tests
          path: junit.xml
          reporter: java-junit

  # Frontend Testing
  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest
    needs: code-quality
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: |
          cd web
          npm ci

      - name: Run unit tests
        run: |
          cd web
          npm run test:unit

      - name: Run integration tests
        run: |
          cd web
          npm run test:integration

      - name: Run E2E tests
        run: |
          cd web
          npm run test:e2e

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          file: web/coverage/lcov.info
          flags: frontend

  # Build and Security Scanning
  build-and-scan:
    name: Build & Security Scan
    runs-on: ubuntu-latest
    needs: [go-tests, frontend-tests]
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.meta.outputs.tags }}
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: 'trivy-results.sarif'

  # Multi-Environment Testing
  environment-tests:
    name: Environment Tests
    runs-on: ubuntu-latest
    needs: build-and-scan
    strategy:
      matrix:
        environment: [dev, test, prod]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Docker Compose
        run: |
          sudo curl -L "https://github.com/docker/compose/releases/download/v2.20.0/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose
          sudo chmod +x /usr/local/bin/docker-compose

      - name: Start ${{ matrix.environment }} environment
        run: |
          docker-compose -f deploy/docker-compose.${{ matrix.environment }}.yml --env-file .env.${{ matrix.environment }} up -d
          sleep 30

      - name: Run environment health checks
        run: |
          # Wait for services to be ready
          timeout 300 bash -c 'until curl -f http://localhost:8080/health; do sleep 5; done' || exit 1
          
          # Run comprehensive health checks
          docker-compose -f deploy/docker-compose.${{ matrix.environment }}.yml --env-file .env.${{ matrix.environment }} ps
          
          # Test API endpoints
          curl -f http://localhost:8080/api/health || exit 1
          curl -f http://localhost:3000 || exit 1

      - name: Run environment-specific tests
        run: |
          if [ "${{ matrix.environment }}" = "test" ]; then
            # Run load tests
            docker-compose -f deploy/docker-compose.test.yml --env-file .env.test --profile load-testing up -d
            docker-compose -f deploy/docker-compose.test.yml --env-file .env.test run --rm load-test run /scripts/load-test.js
          fi

      - name: Collect logs
        if: failure()
        run: |
          docker-compose -f deploy/docker-compose.${{ matrix.environment }}.yml --env-file .env.${{ matrix.environment }} logs > logs-${{ matrix.environment }}.txt

      - name: Upload logs
        if: failure()
        uses: actions/upload-artifact@v3
        with:
          name: logs-${{ matrix.environment }}
          path: logs-${{ matrix.environment }}.txt

      - name: Cleanup
        if: always()
        run: |
          docker-compose -f deploy/docker-compose.${{ matrix.environment }}.yml --env-file .env.${{ matrix.environment }} down -v

  # Performance Testing
  performance-tests:
    name: Performance Tests
    runs-on: ubuntu-latest
    needs: build-and-scan
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Docker Compose
        run: |
          sudo curl -L "https://github.com/docker/compose/releases/download/v2.20.0/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose
          sudo chmod +x /usr/local/bin/docker-compose

      - name: Start test environment
        run: |
          docker-compose -f deploy/docker-compose.test.yml --env-file .env.test up -d
          sleep 60

      - name: Run performance tests
        run: |
          # Install k6
          sudo apt-key adv --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install k6
          
          # Run performance tests
          k6 run --out json=results.json tests/performance/load-test.js

      - name: Upload performance results
        uses: actions/upload-artifact@v3
        with:
          name: performance-results
          path: results.json

      - name: Cleanup
        if: always()
        run: docker-compose -f deploy/docker-compose.test.yml --env-file .env.test down -v

  # Deployment
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [environment-tests, performance-tests]
    if: github.event_name == 'release'
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.28.0'

      - name: Configure kubectl
        run: |
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > kubeconfig
          export KUBECONFIG=kubeconfig

      - name: Deploy to Kubernetes
        run: |
          export KUBECONFIG=kubeconfig
          kubectl apply -f deploy/kubernetes/
          kubectl rollout status deployment/hades-api

      - name: Verify deployment
        run: |
          export KUBECONFIG=kubeconfig
          kubectl get pods -l app=hades
          kubectl get services

  # Notification
  notify:
    name: Notification
    runs-on: ubuntu-latest
    needs: [deploy]
    if: always()
    steps:
      - name: Notify on success
        if: needs.deploy.result == 'success'
        run: |
          curl -X POST "${{ secrets.SLACK_WEBHOOK }}" \
            -H 'Content-type: application/json' \
            --data '{"text":"✅ HADES-V2 deployment successful! 🚀"}'

      - name: Notify on failure
        if: needs.deploy.result == 'failure'
        run: |
          curl -X POST "${{ secrets.SLACK_WEBHOOK }}" \
            -H 'Content-type: application/json' \
            --data '{"text":"❌ HADES-V2 deployment failed! Check GitHub Actions for details."}'
