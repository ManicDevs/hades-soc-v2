name: Secret Scan

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    name: Scan for Secrets
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Scan for secrets in repository
      run: |
        echo "🔍 Scanning repository for secrets..."
        
        # Colors for output
        RED='\033[0;31m'
        GREEN='\033[0;32m'
        YELLOW='\033[1;33m'
        NC='\033[0m'
        
        SECRETS_FOUND=false
        
        # Function to check if file should be skipped (example files are safe)
        should_skip_file() {
            local file="$1"
            if [[ "$file" == *.env.*.example ]]; then
                return 0  # Skip example files
            fi
            return 1  # Don't skip
        }
        
        # Function to scan a file for secrets
        scan_file_for_secrets() {
            local file="$1"
            local line_num=0
            
            # Skip example files
            if should_skip_file "$file"; then
                return 0
            fi
            
            # Check if file exists and is readable
            if [[ ! -f "$file" ]]; then
                return 0
            fi
            
            # Scan file line by line
            while IFS= read -r line; do
                ((line_num++))
                
                # Skip comments and empty lines
                if [[ "$line" =~ ^[[:space:]]*# ]] || [[ -z "$line" ]]; then
                    continue
                fi
                
                # Secret patterns (avoid false positives by requiring non-empty values)
                if [[ "$line" =~ JWT_SECRET=[^[:space:]]+[^[:space:]] ]] || \
                   [[ "$line" =~ PASSWORD=[^[:space:]]+[^[:space:]] ]] || \
                   [[ "$line" =~ .*_KEY=[^[:space:]]+[^[:space:]] ]] || \
                   [[ "$line" =~ .*_TOKEN=[^[:space:]]+[^[:space:]] ]] || \
                   [[ "$line" =~ TAILSCALE_AUTHKEY=[^[:space:]]+[^[:space:]] ]] || \
                   [[ "$line" =~ SECRET=[^[:space:]]+[^[:space:]] ]] || \
                   [[ "$line" =~ API_KEY=[^[:space:]]+[^[:space:]] ]] || \
                   [[ "$line" =~ ENCRYPTION_KEY=[^[:space:]]+[^[:space:]] ]]; then
                    
                    echo -e "${RED}❌ SECRET DETECTED in $file:$line_num${NC}"
                    echo -e "${RED}   Line: $line${NC}"
                    SECRETS_FOUND=true
                fi
                
                # Additional patterns for common secrets
                if [[ "$line" =~ (-----BEGIN[[:space:]]+(RSA|OPENSSH|DSA|EC|PGP) ) ]] || \
                   [[ "$line" =~ (sk-|AKIA|AIza)[0-9A-Za-z+/]{40,} ]] || \
                   [[ "$line" =~ [0-9a-f]{32,} ]] && [[ "$line" =~ .*[kK][eE][yY].*= ]]; then
                    
                    echo -e "${RED}❌ POTENTIAL SECRET DETECTED in $file:$line_num${NC}"
                    echo -e "${RED}   Line: $line${NC}"
                    SECRETS_FOUND=true
                fi
                
            done < "$file"
        }
        
        # Find all relevant files and scan them
        echo "Scanning Go files..."
        find . -name "*.go" -not -path "./vendor/*" -not -path "./.git/*" | while read file; do
            scan_file_for_secrets "$file"
        done
        
        echo "Scanning configuration files..."
        find . -name "*.yml" -o -name "*.yaml" -o -name "*.json" -o -name "*.env*" -not -path "./vendor/*" -not -path "./.git/*" | while read file; do
            scan_file_for_secrets "$file"
        done
        
        echo "Scanning web source files..."
        find ./web -name "*.js" -o -name "*.jsx" -o -name "*.ts" -o -name "*.tsx" -o -name "*.json" | while read file; do
            scan_file_for_secrets "$file"
        done
        
        echo "Scanning scripts and other files..."
        find . -name "*.sh" -o -name "*.bash" -o -name "*.py" -o -name "*.rb" -o -name "*.php" -o -name "*.java" -o -name "*.c" -o -name "*.cpp" -o -name "*.h" -not -path "./vendor/*" -not -path "./.git/*" | while read file; do
            scan_file_for_secrets "$file"
        done
        
        # Check result
        if [ "$SECRETS_FOUND" = true ]; then
            echo -e "${RED}❌ SECRETS DETECTED!${NC}"
            echo -e "${YELLOW}Please remove or replace secrets before merging.${NC}"
            echo -e "${YELLOW}Use placeholder values in .env files instead of real secrets.${NC}"
            exit 1
        else
            echo -e "${GREEN}✅ No secrets detected in repository.${NC}"
            exit 0
        fi
