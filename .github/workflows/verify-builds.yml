name: Verify Builds (smoke)

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.25'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Run verification script (smoke)
        env:
          SKIP_OS: 1
        run: |
          chmod +x ./scripts/verify-builds.sh
          ./scripts/verify-builds.sh
