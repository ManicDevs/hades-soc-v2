name: Go Kernel Smoke Test

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

jobs:
  go-kernel-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.25'

      - name: Build hades-go-kernel
        run: |
          cd os/hades-go-kernel
          chmod +x build.sh
          ./build.sh

      - name: Run smoke (exit immediately)
        run: |
          cd os/hades-go-kernel
          # Run the kernel for 8 seconds, feed 'exit' to its stdin so it terminates
          printf 'exit\n' | timeout 8 ./hades-kernel || true
